name: Dependabot auto-merge

on:
  # Trigger on pull requests that target 'main'
  pull_request_target:
    branches: [main]
    types: [opened, reopened, synchronize]

  # Scheduled sweep every 5 minutes
  schedule:
    - cron: "0/5 * * * *"

# Make sure we have permission to read checks & merge PRs
permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  auto-merge-dependabot:
    runs-on: ubuntu-latest
    steps:
      - name: Merge Dependabot PRs
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Fetch all open PRs in the repo
            const { data: pullRequests } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });

            for (const pr of pullRequests) {
              // Only handle Dependabot PRs that target 'main'
              if (pr.user.login === 'dependabot[bot]' && pr.base.ref === 'main') {

                // Re-fetch the PR for an up-to-date mergeable_state
                const { data: fullPr } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number
                });

                // If GitHub says the PR is clean/mergeable
                if (fullPr.mergeable_state === 'clean') {
                  // Check if all checks have concluded successfully
                  const { data: checks } = await github.rest.checks.listForRef({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ref: fullPr.head.sha
                  });

                  const allPassed = checks.check_runs.every(
                    (run) => run.conclusion === 'success'
                  );

                  if (allPassed) {
                    // Merge the PR
                    await github.rest.pulls.merge({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      pull_number: pr.number,
                      merge_method: 'merge'
                    });
                    console.log(`✅ Merged Dependabot PR #${pr.number}`);
                  }
                }
              }
            }
