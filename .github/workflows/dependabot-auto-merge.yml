name: Dependabot auto-merge

on:
  # This triggers when a PR (targeting main) is opened, reopened, or updated
  pull_request_target:
    branches:
      - main
    types: [opened, reopened, synchronize]

  # Scheduled sweep every 5 minutes for any existing open PRs
  schedule:
    - cron: "0/5 * * * *"

permissions:
  contents: write # Needed to merge the PR
  pull-requests: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    steps:
      - name: Merge successful Dependabot PRs
        uses: actions/github-script@v6
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          script: |
            const { data: pullRequests } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });

            for (const pr of pullRequests) {
              if (pr.user.login === 'dependabot[bot]') {
                if (pr.base.ref === 'main') {
                  // Optionally re-fetch the pull to ensure mergeable_state is up to date
                  const { data: fullPr } = await github.rest.pulls.get({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: pr.number
                  });

                  if (fullPr.mergeable_state === 'clean') {
                    const { data: checks } = await github.rest.checks.listForRef({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      ref: pr.head.sha
                    });

                    // If all checks are successful, merge
                    if (checks.check_runs.every(check => check.conclusion === 'success')) {
                      await github.rest.pulls.merge({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        pull_number: pr.number,
                        merge_method: 'merge'
                      });
                      console.log(`Merged Dependabot PR #${pr.number}`);
                    }
                  }
                }
              }
            }
