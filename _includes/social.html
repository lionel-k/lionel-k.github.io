<ul class="social-media-list">
  {%- if site.social.github -%}
  <li>
    <a href="https://github.com/{{ site.social.github }}" target="_blank" rel="noopener noreferrer">
      <svg class="svg-icon"><use xlink:href="{{ '/assets/minima-social-icons.svg#github' | relative_url }}"></use></svg>
      <span class="username">{{ site.social.github }}</span>
    </a>
  </li>
  {%- endif -%}
</ul>
