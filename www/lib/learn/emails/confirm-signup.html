<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirm your email - lingu.africa</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        line-height: 1.5;
        color: #333;
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
      }
      .container {
        background-color: #0a0a0a;
        border: 1px solid #daa520;
        border-radius: 8px;
        padding: 32px;
        text-align: center;
      }
      h1 {
        color: #daa520;
        font-size: 24px;
        margin-bottom: 24px;
      }
      .button {
        display: inline-block;
        background-color: #daa520;
        color: #0a0a0a;
        text-decoration: none;
        padding: 12px 24px;
        border-radius: 6px;
        font-weight: 600;
        margin: 16px 0;
      }
      .button:hover {
        background-color: #b8860b;
      }
      .footer {
        margin-top: 24px;
        color: #666;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Welcome to lingu.africa</h1>
      <p style="color: #fff; margin-bottom: 24px">
        Please confirm your email address to complete your registration.
      </p>
      <a
        href="{{ .ConfirmationURL }}"
        class="button"
        style="color: #0a0a0a !important"
        >Confirm Email</a
      >
      <p class="footer" style="color: #666">
        If you did not create an account, you can safely ignore this email.
      </p>
    </div>
  </body>
</html>
