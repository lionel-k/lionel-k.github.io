# Site Settings
title: Lionel Kubwimana
description: >-
  Personal website and blog documenting my journey as a software engineer
  and builder, including my experiences with OpenClaw.
tagline: Software Engineer & AI Product Builder
# GitHub Pages settings
baseurl: ""
url: "https://lionel-k.github.io"

# Build settings
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false
permalink: /blog/:title/

# Collections
collections:
  posts:
    output: true
    permalink: /blog/:title/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

sass:
  quiet_deps: true
  silence_deprecations:
    - import
    - global-builtin
    - color-functions

# Author info
author:
  name: Lionel Kubwimana
  email: lionel@kubwimana.me
  github: lionel-k

# Social links
social:
  github: lionel-k

# Umami Analytics
umami:
  website_id: "f1519f41-6b8d-44ad-900d-bf9921c2c4eb"
  host_url: "https://analytics.lingu.africa"

# Theme (GitHub Pages compatible)
theme: minima

# Nav links (explicit paths). GitHub Pages still builds with Jekyll 3.x; jekyll-paginate
# registers page 2+ as separate Page objects with distinct paths, so auto-discovered
# header pages list duplicates "Blog". Local Jekyll 4 often reports the same path for
# all paginated siblings, which hides the bug. Listing pages here matches Minima's
# recommended approach and works on both builders.
header_pages:
  - about.md
  - blog/index.html

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .sass-cache/
  - .jekyll-cache/
  - .git/
  - gemfiles/
