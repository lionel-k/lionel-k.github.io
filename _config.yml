# Site Settings
title: Lionel Kubwimana
description: >-
  Personal website and blog documenting my journey as a software engineer
  and builder, including my experiences with OpenClaw.
tagline: Software Engineer & Builder

# GitHub Pages settings
baseurl: ""
url: "https://lionel-k.github.io"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /blog/:title/

# Pagination
paginate: 5
paginate_path: "/blog/page:num/"

# Collections
collections:
  posts:
    output: true
    permalink: /blog/:title/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Author info
author:
  name: Lionel Kubwimana
  email: lionel.kubwimana@gmail.com
  github: lionel-k

# Social links
social:
  github: lionel-k
  linkedin: lionel-kubwimana

# Theme (GitHub Pages compatible)
theme: minima

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .sass-cache/
  - .jekyll-cache/
  - .git/
  - gemfiles/